<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>A-maze-ng</title>
  <link rel="stylesheet" href="style.css?v=1774683487">
</head>
<body>
  <main id="app">
    <!-- Start Screen -->
    <section id="start-screen" class="screen" role="region" aria-label="Game settings">
      <h1 class="game-title">A-maze-ng</h1>

      <fieldset class="settings-group">
        <legend>Maze Size</legend>
        <div class="preset-buttons">
          <button type="button" class="preset-btn" data-width="10" data-height="10">Small (10x10)</button>
          <button type="button" class="preset-btn selected" data-width="20" data-height="20">Medium (20x20)</button>
          <button type="button" class="preset-btn" data-width="40" data-height="40">Large (40x40)</button>
          <button type="button" class="preset-btn" data-width="custom" data-height="custom" id="custom-preset-btn">Custom</button>
        </div>
        <div class="custom-size-inputs" id="custom-size-inputs" hidden>
          <label class="square-toggle">
            <input type="checkbox" id="square-check" checked>
            Square maze
          </label>
          <div class="size-slider">
            <label for="custom-width">Width:</label>
            <input type="range" id="custom-width" min="2" max="80" value="20">
            <output for="custom-width" id="custom-width-value">20</output>
          </div>
          <div class="size-slider" id="height-slider">
            <label for="custom-height">Height:</label>
            <input type="range" id="custom-height" min="2" max="80" value="20">
            <output for="custom-height" id="custom-height-value">20</output>
          </div>
        </div>
        <p class="error-message" id="size-error" role="alert" hidden></p>
      </fieldset>

      <fieldset class="settings-group">
        <legend>Visibility Radius</legend>
        <div class="radius-selector">
          <label for="radius-select">Radius:</label>
          <input type="range" id="radius-select" min="1" max="5" value="2">
          <output for="radius-select" id="radius-value">2</output>
        </div>
      </fieldset>

      <div class="start-actions">
        <button type="button" id="start-btn" class="primary-btn">Start Game</button>
        <button type="button" id="scoreboard-btn" class="secondary-btn">View Scoreboard</button>
      </div>
    </section>

    <!-- Game Screen -->
    <section id="game-screen" class="screen" hidden>
      <section class="hud" id="hud" aria-live="polite">
        <span id="hud-moves"></span>
        <button type="button" id="abort-btn" class="abort-btn">Abort</button>
      </section>
      <canvas id="maze-canvas" width="800" height="800"></canvas>
      <p class="controls-hint" id="controls-hint"></p>

      <!-- Abort info (shown below canvas) -->
      <div id="abort-screen" class="overlay" role="dialog" aria-label="Game aborted" hidden>
        <h2>Game Aborted</h2>
        <p id="abort-info"></p>
        <div class="overlay-actions">
          <button type="button" id="abort-menu-btn">Back to Menu</button>
        </div>
      </div>

      <!-- Win info (shown below canvas) -->
      <div id="win-screen" class="overlay" role="dialog" aria-label="You won" hidden>
        <h2>You Win!</h2>
        <p id="win-efficiency"></p>
        <p id="win-moves"></p>
        <p id="win-optimal"></p>
        <p id="win-best" class="best-indicator" hidden>New Personal Best!</p>
        <div class="overlay-actions">
          <button type="button" id="play-again-btn">Play Again</button>
          <button type="button" id="back-to-menu-btn">Back to Menu</button>
        </div>
      </div>
    </section>

    <!-- Scoreboard Screen -->
    <section id="scoreboard-screen" class="screen" role="region" aria-label="Scoreboard" hidden>
      <h2 class="screen-title">Scoreboard</h2>
      <div class="scoreboard-config">
        <label for="sb-size">Size:</label>
        <select id="sb-size">
          <option value="10x10">10x10</option>
          <option value="20x20" selected>20x20</option>
          <option value="40x40">40x40</option>
        </select>
        <label for="sb-radius">Radius:</label>
        <select id="sb-radius">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>
      <table class="scoreboard-table" id="scoreboard-table">
        <thead>
          <tr><th>#</th><th>Efficiency</th><th>Moves</th><th>Size</th><th>Date</th></tr>
        </thead>
        <tbody id="scoreboard-body"></tbody>
      </table>
      <p id="no-scores-msg" hidden>No scores yet for this configuration.</p>
      <button type="button" id="sb-back-btn" class="secondary-btn">Back to Menu</button>
    </section>
  </main>
  <noscript><p style="color:#fff;text-align:center;padding:2rem">Please open this file in Safari or Chrome to play — this viewer does not support JavaScript.</p></noscript>
  <script src="game.js?v=1774683487"></script>
</body>
</html>
